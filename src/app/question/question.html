@if (loading) {
<p>Loading...</p>
} @else if (error) {
<p>{{ error }}</p>
} @else if (data.questions.length === 0) {
<p>No Questions found</p>
} @else {
@for (item of data.questions; track item.question; let i = $index) {
<div class="question-container">
    <div class="question">
        <span class="ask">{{ item.question }}</span>
        <button type="button" (click)="onExpandClick(i)">
            <img src="{{ expandedIndex !== i ? './icon-plus.svg' : './icon-minus.svg' }}" alt="Expand">
        </button>
    </div>
    <div class="answer" [class.expanded]="expandedIndex === i">{{ item.answer }}</div>
</div>
}
}
